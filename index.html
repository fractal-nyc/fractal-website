<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Fractal NYC</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- FRAC-192: preload the LCP hero background (AVIF). imagesrcset/imagesizes
         must mirror the AVIF <source> in src/components/sections/Hero.tsx
         (~303-338) so the preload and the <picture> pick the same candidate
         (no double download). Browsers without AVIF ignore this type-mismatched
         preload and fetch the WebP <source> normally.
         BASE_URL caveat: these hard-code a leading "/" — they only match
         Hero.tsx's import.meta.env.BASE_URL-built URLs while Vite base is "/"
         (true today; no `base` key in vite.config.ts). -->
    <link rel="preload" as="image" type="image/avif"
          imagesrcset="/images/hero/fractal-background-640.avif 640w, /images/hero/fractal-background-1280.avif 1280w, /images/hero/fractal-background-1920.avif 1920w, /images/hero/fractal-background-2560.avif 2560w"
          imagesizes="100vw" />

    <!-- FRAC-192: preload the 8 octahedron banner textures so the bytes are
         fetched during HTML parse, well before the lazy three-vendor chunk +
         Canvas mount fire TextureLoader.loadAsync. Hrefs MUST stay in sync with
         FACE_BANNER_IMAGES in src/components/three/OctahedronHero.tsx (~363) and
         with public/images/banners/. Use the literal filenames
         (new-liberal-arts.webp / political-club.webp), NOT the face keys
         school / forum. No crossorigin: TextureLoader fetches same-origin,
         non-CORS — a mismatched crossorigin would double-fetch. These are
         as="image" hints only; they do NOT reintroduce a three-vendor / scene
         chunk preload (FRAC-181). Same BASE_URL="/" caveat as above applies. -->
    <link rel="preload" as="image" type="image/webp" href="/images/banners/story.webp" />
    <link rel="preload" as="image" type="image/webp" href="/images/banners/campus.webp" />
    <link rel="preload" as="image" type="image/webp" href="/images/banners/neighborhood.webp" />
    <link rel="preload" as="image" type="image/webp" href="/images/banners/events.webp" />
    <link rel="preload" as="image" type="image/webp" href="/images/banners/new-liberal-arts.webp" />
    <link rel="preload" as="image" type="image/webp" href="/images/banners/political-club.webp" />
    <link rel="preload" as="image" type="image/webp" href="/images/banners/lab.webp" />
    <link rel="preload" as="image" type="image/webp" href="/images/banners/people.webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- FRAC-181: font CSS loaded here (not via @import in src/index.css) so
         the browser can issue the request during HTML parse instead of waiting
         for index.css to download + parse. Trimmed weight/axis ranges:
           - Fraunces: collapsed from 100..900 to 300..500 (no font-bold or
             heavier paired with font-serif anywhere in src/).
           - Inter: 300;400;500;600 (600 kept for shadcn UI primitives).
           - JetBrains Mono: 100;400;500 (no bolder weights in use).
           - Jacquard 24: single weight, unchanged. -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..500;1,9..144,300..500&family=Inter:wght@300;400;500;600&family=Jacquard+24&family=JetBrains+Mono:wght@100;400;500&display=swap">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
