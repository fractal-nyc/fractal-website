<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Soft tinted faces so the silhouette stays readable but the nodes/wireframe lead -->
  <polygon points="16,3 16,16 3,16"  fill="#C13B2A" fill-opacity="0.18"/>
  <polygon points="16,3 29,16 16,16" fill="#C41E20" fill-opacity="0.18"/>
  <polygon points="3,16 16,16 16,29" fill="#2E6B4A" fill-opacity="0.18"/>
  <polygon points="16,16 29,16 16,29" fill="#E870A0" fill-opacity="0.18"/>

  <!-- Diamond perimeter + interior diagonals (the X is the octahedron's hidden edges) -->
  <path d="M16 3 L29 16 L16 29 L3 16 Z M3 16 L29 16 M16 3 L16 29"
        stroke="#171717" stroke-width="1.1"
        stroke-linejoin="round" stroke-linecap="round"
        fill="none"/>

  <!-- Nav nodes at the 4 outer octahedron vertices + 1 at center (front vertex) -->
  <!-- Top: events deep -->
  <circle cx="16" cy="3"  r="2.2" fill="#C13B2A" stroke="#171717" stroke-width="0.6"/>
  <!-- Right: campus light -->
  <circle cx="29" cy="16" r="2.2" fill="#2E6B4A" stroke="#171717" stroke-width="0.6"/>
  <!-- Bottom: visit/neighborhood -->
  <circle cx="16" cy="29" r="2.2" fill="#889460" stroke="#171717" stroke-width="0.6"/>
  <!-- Left: school -->
  <circle cx="3"  cy="16" r="2.2" fill="#C41E20" stroke="#171717" stroke-width="0.6"/>
  <!-- Center: story (front +Z vertex) — gold like the streaming edge text -->
  <circle cx="16" cy="16" r="2.2" fill="#D4BA58" stroke="#171717" stroke-width="0.6"/>
</svg>
